<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>United — Create your account</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #1a1a2e;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 0.25rem;
    }

    .sub {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 1.75rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #333;
      margin-bottom: 0.35rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #e0e0e0;
      border-radius: 0.625rem;
      font-size: 1rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #1a1a2e; }

    .hint {
      font-size: 0.78rem;
      color: #aaa;
      margin-top: -0.75rem;
      margin-bottom: 1rem;
    }

    .btn {
      width: 100%;
      background: #1a1a2e;
      color: #fff;
      padding: 0.85rem;
      border-radius: 0.75rem;
      font-size: 1rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.5rem;
    }

    .btn:hover:not(:disabled) { background: #2d2d4e; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .message {
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      margin-top: 1rem;
      display: none;
    }

    .message.error { background: #fff0f0; color: #c0392b; }
    .message.success { background: #f0fff4; color: #27ae60; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">United</div>

    <h1>Create your account</h1>
    <p class="sub">Choose a username and password. Your data stays in the family.</p>

    <form id="registerForm">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="e.g. pierre" autocomplete="username"
             pattern="[a-z0-9._\-]+" minlength="3" maxlength="32" required />
      <p class="hint">Lowercase letters, numbers, dots, dashes only.</p>

      <label for="displayName">Display name</label>
      <input type="text" id="displayName" placeholder="e.g. Pierre Dupont"
             maxlength="64" required />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="At least 8 characters"
             autocomplete="new-password" minlength="8" required />

      <label for="passwordConfirm">Confirm password</label>
      <input type="password" id="passwordConfirm" placeholder="Repeat your password"
             autocomplete="new-password" required />

      <button type="submit" class="btn" id="submitBtn">Join United</button>
    </form>

    <div class="message error" id="errorMsg"></div>
    <div class="message success" id="successMsg">Account created! Redirecting you to the app…</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
