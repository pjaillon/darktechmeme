<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>United — You've been invited</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #1a1a2e;
      margin-bottom: 0.25rem;
    }

    .tagline {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 0.95rem;
      color: #555;
      line-height: 1.5;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      background: #1a1a2e;
      color: #fff;
      padding: 0.85rem 2rem;
      border-radius: 0.75rem;
      font-size: 1rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: none;
      width: 100%;
      transition: background 0.15s;
    }

    .btn:hover { background: #2d2d4e; }

    .error {
      background: #fff0f0;
      color: #c0392b;
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">United</div>
    <div class="tagline">Private family messenger</div>

    <h1>You've been invited</h1>
    <p>Someone in your family is sharing their world with you. Create your account to join.</p>

    <button class="btn" id="continueBtn">Create my account</button>
    <div class="error" id="error">This invite link is invalid or has expired.</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('error').style.display = 'block';
      document.getElementById('continueBtn').disabled = true;
    }

    document.getElementById('continueBtn').addEventListener('click', () => {
      if (token) {
        window.location.href = '/register.html?token=' + encodeURIComponent(token);
      }
    });
  </script>
</body>
</html>
